    <!-- No-flash theme init: applies saved/preferred theme before first paint -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>

    <!-- Structured data: Person schema for rich results -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Prashant Yadav",
        "jobTitle": "E-commerce Specialist & Digital Marketing Executive",
        "url": "https://prashantyadav.dev/",
        "image": "https://prashantyadav.dev/profile.jpg",
        "address": { "@type": "PostalAddress", "addressLocality": "Delhi", "addressCountry": "IN" },
        "knowsLanguage": ["English", "Hindi"],
        "knowsAbout": [
          "Google Ads",
          "Meta Ads",
          "Amazon Marketplace Management",
          "Performance Marketing",
          "Lead Generation",
          "SEO",
          "Web Development"
        ],
        "sameAs": [
          "https://www.linkedin.com/",
          "https://www.instagram.com/"
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"

  </head>
